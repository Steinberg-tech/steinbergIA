name: Deploy para Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ${{ secrets.SERVER_PATH }}

            echo ">>> Atualizando código..."
            git pull origin main

            echo ">>> Instalando dependências..."
            pip install -r requirements.txt --quiet

            echo ">>> Reiniciando serviço..."
            if command -v docker-compose &> /dev/null; then
              docker-compose pull
              docker-compose up -d --build
            elif systemctl is-active --quiet sac-ai; then
              sudo systemctl restart sac-ai
            elif command -v pm2 &> /dev/null; then
              pm2 restart all
            else
              pkill -f "uvicorn api.app:app" || true
              nohup uvicorn api.app:app --host 0.0.0.0 --port 8000 &> logs/uvicorn.log &
            fi

            echo ">>> Deploy concluído com sucesso!"
